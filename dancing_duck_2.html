            for (let i = 0; i < bars; i++) {
                const v = (freqData[Math.floor(i / bars * freqData.length * 0.8)] || 0) / 255;
                const barH = v * height * 0.72;
                const hue = (i / bars) * 280;
                ctx.save();
                const barGrad = ctx.createLinearGradient(0, height, 0, height - barH);
                barGrad.addColorStop(0, `hsla(${hue},90%,55%,0.9)`);
                barGrad.addColorStop(1, `hsla(${hue + 40},100%,80%,0.5)`);
                ctx.fillStyle = barGrad;
                ctx.shadowColor = `hsl(${hue},100%,60%)`;
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.roundRect(i * bw + 1, height - barH, bw - 2, barH, [3, 3, 0, 0]);
                ctx.fill();
                ctx.restore();
            }
            // Mirror reflection
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.scale(1, -1);
            ctx.translate(0, -height * 2);
            for (let i = 0; i < bars; i++) {
                const v = (freqData[Math.floor(i / bars * freqData.length * 0.8)] || 0) / 255;
                const barH = v * height * 0.72;
                const hue = (i / bars) * 280;
                ctx.fillStyle = `hsl(${hue},80%,60%)`;
                ctx.beginPath();
                ctx.roundRect(i * bw + 1, height - barH, bw - 2, barH, [3, 3, 0, 0]);
                ctx.fill();
            }
            ctx.restore();
        }

        else if (scene === 'Waveform') {
            // Oscilloscope-style waveform ring in the center
            if (analyser && isPlaying) {
                const waveData = new Uint8Array(analyser.fftSize);
                analyser.getByteTimeDomainData(waveData);

                // Outer glow ring
                const energy = smoothEnergy;
                const ringR = 120 + energy * 80;
                ctx.save();
                ctx.translate(width / 2, height / 2);
                const ringGrad = ctx.createRadialGradient(0, 0, ringR * 0.7, 0, 0, ringR + 20);
                ringGrad.addColorStop(0, `rgba(129,140,248,${0.08 + energy * 0.15})`);
                ringGrad.addColorStop(1, 'rgba(129,140,248,0)');
                ctx.fillStyle = ringGrad;
                ctx.beginPath(); ctx.arc(0, 0, ringR + 30, 0, Math.PI * 2); ctx.fill();

                // Waveform as a circle
                ctx.beginPath();
                for (let i = 0; i < waveData.length; i++) {
                    const angle = (i / waveData.length) * Math.PI * 2 - Math.PI / 2;
                    const sample = (waveData[i] / 128 - 1);
                    const r = ringR + sample * 60;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = `rgba(167,139,250,${0.7 + energy * 0.3})`;
                ctx.lineWidth = 2.5;
                ctx.shadowColor = '#a78bfa';
                ctx.shadowBlur = 16;
                ctx.stroke();

                // Horizontal waveform at bottom
                ctx.restore();
                ctx.save();
                ctx.translate(0, height * 0.82);
                ctx.beginPath();
                for (let i = 0; i < waveData.length; i++) {
                    const x = (i / waveData.length) * width;
                    const y = ((waveData[i] / 128) - 1) * 55;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.strokeStyle = 'rgba(244,114,182,0.6)';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#f472b6';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.restore();
            } else {
                // Idle: gentle sine
                ctx.save();
                ctx.translate(0, height * 0.82);
                ctx.beginPath();
                for (let x = 0; x < width; x++) {
                    const y = Math.sin((x / width) * Math.PI * 6 + t * 0.002) * 18;
                    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.strokeStyle = 'rgba(244,114,182,0.3)';
                ctx.lineWidth = 2; ctx.stroke();
                ctx.restore();
            }
        }

        else if (scene === 'Galaxy') {
            // Particle stars that pulse and orbit to the beat
            ctx.save();
            ctx.translate(width / 2, height / 2);
            const energy = smoothEnergy;
            const beat = energy > 0.55;
            const numStars = 120;
            for (let i = 0; i < numStars; i++) {
                const seed = i * 137.508;
                const baseR = 40 + (i / numStars) * Math.min(width, height) * 0.48;
                const angle = seed + t * 0.0003 * (1 + energy * 2) * (i % 2 === 0 ? 1 : -0.5);
                const pulse = beat ? 1 + Math.sin(t * 0.04 + i) * 0.4 * energy : 1;
                const r = baseR * pulse;
                const x = Math.cos(angle) * r;
                const y = Math.sin(angle) * r * 0.55;
                const starSize = 1 + (freqData ? (freqData[i % freqData.length] || 0) / 255 : 0) * 4;
                const hue = (i * 11 + t * 0.02) % 360;
                ctx.beginPath();
                ctx.arc(x, y, starSize, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue},80%,75%,${0.5 + energy})`;
                ctx.shadowColor = `hsl(${hue},100%,70%)`;
                ctx.shadowBlur = beat ? 12 : 4;
                ctx.fill();
            }
            // Central glow on beat
            if (energy > 0.3) {
                const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, 80 + energy * 100);
                cg.addColorStop(0, `rgba(250,204,21,${energy * 0.4})`);
                cg.addColorStop(1, 'rgba(250,204,21,0)');
                ctx.fillStyle = cg;
                ctx.beginPath(); ctx.arc(0, 0, 180 + energy * 100, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }
    }

    // --- Skateboard Mini Game Variables & Loops ---
    let skateKeys = {};
    let skateDuck = {
        y: 0,
        vy: 0,
        isJumping: false,
        height: 100,
        scaleY: 1.0,
        crouching: false,
        shieldActive: false,
        boostTimer: 0
    };
    let skateSpeed = 4;
    let skateScore = 0;
    let skateLives = 3;
    let skateObstacles = [];
    let skateItems = [];
    let obstacleTimer = 0;
    let itemTimer = 0;
    let groundY = 0;
    let isGameOver = false;

    // Boost / D-key cooldown system
    const BOOST_USE_MAX   = 6000;  // 6s of boost available
    const BOOST_RECHARGE  = 3000;  // 3s recharge after depletion
    let boostCharge       = BOOST_USE_MAX; // current charge (ms)
    let boostRecharging   = false;         // locked-out recharge phase
    let boostRechargeTimer = 0;            // counts up during recharge

    // Hit-flash so duck flashes red on losing a life
    let hitFlashTimer = 0;
    const HIT_FLASH_DURATION = 800;
    let hitInvincible = false; // brief invincibility after a hit

    window.addEventListener('keydown', (e) => {
        if (!isSkateMode) return;
        const key = e.key.toLowerCase();
        skateKeys[key] = true;
        
        if (e.key === " " || e.key === "ArrowUp" || e.key === "ArrowDown") {
            e.preventDefault();
        }
        
        if (e.key === " " && !skateDuck.isJumping && !isGameOver) {
            skateDuck.vy = -16;
            skateDuck.isJumping = true;
        }

        if (key === 'q') {
            quitOverlay.classList.remove('hidden');
        }

        if (!quitOverlay.classList.contains('hidden')) {
            if (key === 'y') {
                exitSkateMode();
                quitOverlay.classList.add('hidden');
            } else if (key === 'n') {
                quitOverlay.classList.add('hidden');
            }
        }
    });

    window.addEventListener('keyup', (e) => {
        if (!isSkateMode) return;
        skateKeys[e.key.toLowerCase()] = false;
    });

    document.getElementById('confirmYesBtn').onclick = () => {
        exitSkateMode();
        quitOverlay.classList.add('hidden');
    };
    document.getElementById('confirmNoBtn').onclick = () => {
        quitOverlay.classList.add('hidden');
    };

    skateModeBtn.onclick = () => {
        if (isSkateMode) {
            quitOverlay.classList.remove('hidden');
        } else {
            enterSkateMode();
        }
    };

    function enterSkateMode() {
        isSkateMode = true;
        skateModeBtn.innerText = "🛑 Quit Skate";
        document.querySelector('.controls').style.display = 'none';
        document.getElementById('weaponsDropdownBtn').style.display = 'none';
        document.getElementById('ballBtn').style.display = 'none';
        document.getElementById('friendBtn').style.display = 'none';
        document.getElementById('foodDropdownBtn').parentElement.style.display = 'none';
        document.getElementById('clearBtn').style.display = 'none';
        document.getElementById('bgBtn').style.display = 'none';
        updateBodyBackground();
        resetSkateGame();
    }

    function exitSkateMode() {
        isSkateMode = false;
        skateModeBtn.innerText = "🛹 Skate Mode";
        document.querySelector('.controls').style.display = 'flex';
        document.getElementById('weaponsDropdownBtn').style.display = '';
        document.getElementById('ballBtn').style.display = '';
        document.getElementById('friendBtn').style.display = '';
        document.getElementById('foodDropdownBtn').parentElement.style.display = '';
        document.getElementById('bgBtn').style.display = '';
        updateBodyBackground();
    }

    function resetSkateGame() {
        skateDuck.y = 0;
        skateDuck.vy = 0;
        skateDuck.isJumping = false;
        skateDuck.crouching = false;
        skateDuck.shieldActive = false;
        skateDuck.boostTimer = 0;
        skateSpeed = 4;
        skateScore = 0;
        skateLives = 3;
        skateObstacles = [];
        skateItems = [];
        obstacleTimer = 0;
        itemTimer = 0;
        isGameOver = false;
        boostCharge = BOOST_USE_MAX;
        boostRecharging = false;
        boostRechargeTimer = 0;
        hitFlashTimer = 0;
        hitInvincible = false;
        skateModeBtn.blur();
    }

    function takeDamage() {
        if (hitInvincible || isGameOver) return;
        skateLives--;
        hitFlashTimer = HIT_FLASH_DURATION;
        hitInvincible = true;
        // Knockback wobble
        skateDuck.vy = -8;
        if (skateLives <= 0) {
            isGameOver = true;
        }
    }

    function runSkateGame(dt) {
        groundY = height - 120;
        ctx.clearRect(0, 0, width, height);

        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, width, groundY);

        ctx.fillStyle = "#1e293b";
        ctx.fillRect(0, groundY, width, height - groundY);
        
        ctx.fillStyle = "#e2e8f0";
        for (let i = 0; i < width + 100; i += 80) {
            const shift = (performance.now() * 0.1 * skateSpeed) % 80;
            ctx.fillRect(i - shift, groundY + 10, 40, 6);
        }

        if (isGameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.75)";
            ctx.fillRect(0, 0, width, height);
            
            ctx.fillStyle = "#facc15";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("WIPED OUT! 🦆", width/2, height/2 - 50);
            
            ctx.fillStyle = "#a3e635";
            ctx.font = "bold 24px sans-serif";
            ctx.fillText(`Obstacles Cleared: ${skateScore}`, width/2, height/2 + 2);

            ctx.fillStyle = "#ffffff";
            ctx.font = "18px sans-serif";
            ctx.fillText("Press Space to Skate Again", width/2, height/2 + 46);
            
            if (skateKeys[' ']) {
                resetSkateGame();
            }
            return;
        }

        // Score is obstacle-based; no continuous increment here

        if (skateKeys['s']) {
            skateDuck.crouching = true;
            skateDuck.height = 50;
            skateDuck.scaleY = 0.5;
        } else if (skateKeys['w']) {
            skateDuck.crouching = false;
            skateDuck.height = 160;
            skateDuck.scaleY = 1.6;
        } else {
            skateDuck.crouching = false;
            skateDuck.height = 100;
            skateDuck.scaleY = 1.0;
        }

        skateDuck.vy += 0.8; 
        skateDuck.y += skateDuck.vy;
        
        if (skateDuck.y >= 0) {
            skateDuck.y = 0;
            skateDuck.vy = 0;
            skateDuck.isJumping = false;
        }

        obstacleTimer += dt;
        if (obstacleTimer > 2000 - (skateSpeed * 100)) {
            obstacleTimer = 0;
            const isOverhead = Math.random() > 0.5;
            
            if (isOverhead) {
                // Hangs from the top — duck must crouch. Bottom edge sits just above where a standing duck's head is.
                const hangBottom = groundY - 70; // bottom of the hanging bar
                const hangH = hangBottom;        // reaches all the way to y=0 (top of play area)
                skateObstacles.push({
                    x: width,
                    y: 0,
                    w: 40,
                    h: hangH,
                    type: 'overhead'
                });
            } else {
                skateObstacles.push({
                    x: width,
                    y: groundY - 40,
                    w: 30,
                    h: 40,
                    type: 'ground'
                });
            }
        }

        itemTimer += dt;
        if (itemTimer > 1500) {
            itemTimer = 0;

            // Spawn rates: coins (lives) very rare, shield uncommon, boost common
            const rr = Math.random();
            let itemType;
            if      (rr < 0.04)  itemType = 'coin';    // 4%  — lives are very rare
            else if (rr < 0.22)  itemType = 'shield';  // 18%
            else                 itemType = 'boost';   // 78%

            const highSpawn = Math.random() < 0.4;
            let spawnY;
            if (highSpawn) {
                spawnY = groundY - 110 - Math.random() * 40;
            } else {
                spawnY = groundY - 40 - Math.random() * 60;
            }

            const itemId = Math.random().toString(36).slice(2);
            skateItems.push({
                x: width,
                y: spawnY,
                radius: 14,
                type: itemType,
                pulse: 0,
                high: highSpawn,
                id: itemId
            });

            // 30% of HIGH spawns: queue an overhead bar behind the item
            if (highSpawn && Math.random() < 0.3) {
                const gap = skateSpeed * 72;
                const hangH = groundY - 70;
                skateObstacles.push({
                    x: width + gap,
                    y: 0,
                    w: 40,
                    h: hangH,
                    type: 'overhead',
                    scored: false
                });
            }

            // 30% chance: place quicksand BEFORE the item (duck must jump over sand to reach item)
            if (Math.random() < 0.30) {
                const sandGap = skateSpeed * 50; // quicksand arrives ~1s before the item
                skateObstacles.push({
                    x: width - sandGap,   // spawns ahead of the item (lower x = arrives sooner)
                    y: groundY - 18,
                    w: 90,
                    h: 18,
                    type: 'quicksand',
                    linkedItemId: itemId,
                    scored: false
                });
            }
        }

        if (skateDuck.boostTimer > 0) {
            skateDuck.boostTimer -= dt;
            if (skateDuck.boostTimer < 0) skateDuck.boostTimer = 0;
        }

        // Boost / D-key with 6s use, 3s recharge cooldown
        if (boostRecharging) {
            boostRechargeTimer += dt;
            if (boostRechargeTimer >= BOOST_RECHARGE) {
                boostRecharging = false;
                boostRechargeTimer = 0;
                boostCharge = BOOST_USE_MAX;
            }
            // Can't use D during recharge
            skateSpeed += (4 - skateSpeed) * 0.03;
        } else if (skateKeys['d'] && boostCharge > 0) {
            skateSpeed = Math.min(10, skateSpeed + 0.15);
            boostCharge -= dt;
            if (boostCharge <= 0) {
                boostCharge = 0;
                boostRecharging = true;
                boostRechargeTimer = 0;
            }
        } else if (skateKeys['a']) {
            skateSpeed = Math.max(1, skateSpeed - 0.08);
        } else {
            skateSpeed += (4 - skateSpeed) * 0.02;
        }

        // Too slow = wipeout
        if (skateSpeed < 1.2 && !isGameOver) {
            takeDamage();
        }

        // Hit-flash / invincibility timer
        if (hitInvincible) {
            hitFlashTimer -= dt;
            if (hitFlashTimer <= 0) {
                hitFlashTimer = 0;
                hitInvincible = false;
            }
        }

        // Render obstacles
        for (let i = skateObstacles.length - 1; i >= 0; i--) {
            const obs = skateObstacles[i];
            obs.x -= skateSpeed;

            const duckScreenX = 120;
            const duckWidth = 44;
            // Duck top: when standing, head reaches ~100px above board; crouching ~50px
            const duckTop = groundY + skateDuck.y - skateDuck.height;
            const duckBottom = groundY + skateDuck.y; // board level

            if (obs.type === 'overhead') {
                // Hanging bar from top of screen — red danger bar with warning stripes
                ctx.save();
                // Main bar body
                ctx.fillStyle = "#ef4444";
                ctx.beginPath();
                ctx.roundRect(obs.x, obs.y, obs.w, obs.h, [0, 0, 8, 8]);
                ctx.fill();
                // Hazard stripes
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(obs.x, obs.y, obs.w, obs.h, [0, 0, 8, 8]);
                ctx.clip();
                ctx.strokeStyle = "rgba(253,224,71,0.35)";
                ctx.lineWidth = 8;
                for (let s = -obs.h; s < obs.w + obs.h; s += 22) {
                    ctx.beginPath();
                    ctx.moveTo(obs.x + s, obs.y);
                    ctx.lineTo(obs.x + s + obs.h, obs.y + obs.h);
                    ctx.stroke();
                }
                ctx.restore();
                // Bottom edge glow
                ctx.shadowColor = "#ef4444";
                ctx.shadowBlur = 12;
                ctx.fillStyle = "#fca5a5";
                ctx.fillRect(obs.x, obs.y + obs.h - 6, obs.w, 6);
                ctx.shadowBlur = 0;
                // Warning label
                ctx.fillStyle = "#fff";
                ctx.font = "bold 11px monospace";
                ctx.textAlign = "center";
                ctx.fillText("DUCK!", obs.x + obs.w / 2, obs.y + obs.h - 12);
                ctx.restore();

                // Collision: duck top must be BELOW the bar's bottom edge
                const barBottom = obs.y + obs.h;
                const horizHit = obs.x < duckScreenX + duckWidth / 2 && obs.x + obs.w > duckScreenX - duckWidth / 2;
                if (horizHit && duckTop < barBottom) {
                    if (skateDuck.boostTimer > 0) { skateObstacles.splice(i, 1); skateScore++; continue; }
                    if (skateDuck.shieldActive) { skateDuck.shieldActive = false; skateObstacles.splice(i, 1); skateScore++; continue; }
                    takeDamage();
                }
                // Award point when fully passed
                if (!obs.scored && obs.x + obs.w < duckScreenX - duckWidth / 2) {
                    obs.scored = true;
                    skateScore++;
                }
            } else if (obs.type === 'ground') {
                // Ground cone/triangle obstacle
                ctx.save();
                ctx.fillStyle = "#f97316";
                ctx.strokeStyle = "#c2410c";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(obs.x + obs.w / 2, obs.y);
                ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                ctx.lineTo(obs.x, obs.y + obs.h);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                // Cone stripe
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.moveTo(obs.x + obs.w / 2, obs.y + 4);
                ctx.lineTo(obs.x + obs.w * 0.8, obs.y + obs.h - 4);
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.restore();

                // Collision: duck bottom must be ABOVE the cone's top
                const horizHit = obs.x < duckScreenX + duckWidth / 2 && obs.x + obs.w > duckScreenX - duckWidth / 2;
                if (horizHit && duckBottom > obs.y) {
                    if (skateDuck.boostTimer > 0) { skateObstacles.splice(i, 1); skateScore++; continue; }
                    if (skateDuck.shieldActive) { skateDuck.shieldActive = false; skateObstacles.splice(i, 1); skateScore++; continue; }
                    takeDamage();
                }
                // Award point when fully passed
                if (!obs.scored && obs.x + obs.w < duckScreenX - duckWidth / 2) {
                    obs.scored = true;
                    skateScore++;
                }
            } else if (obs.type === 'quicksand') {
                // --- Draw quicksand patch ---
                ctx.save();
                // Base sandy fill with animated ripple lines
                const sg = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.h);
                sg.addColorStop(0, "#d97706");
                sg.addColorStop(0.5, "#b45309");
                sg.addColorStop(1, "#92400e");
                ctx.fillStyle = sg;
                ctx.beginPath();
                ctx.roundRect(obs.x, obs.y, obs.w, obs.h, [4, 4, 0, 0]);
                ctx.fill();

                // Animated swirl lines to sell the quicksand look
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(obs.x, obs.y, obs.w, obs.h, [4, 4, 0, 0]);
                ctx.clip();
                const swirl = (performance.now() * 0.001) % 1;
                ctx.strokeStyle = "rgba(251,191,36,0.35)";
                ctx.lineWidth = 2;
                for (let s = 0; s < 3; s++) {
                    const sx = obs.x + ((swirl + s / 3) % 1) * obs.w;
                    ctx.beginPath();
                    ctx.moveTo(sx, obs.y);
                    ctx.bezierCurveTo(sx + 14, obs.y + 6, sx - 14, obs.y + 12, sx, obs.y + obs.h);
                    ctx.stroke();
                }
                ctx.restore();

                // "QUICKSAND" label
                ctx.fillStyle = "#fde047";
                ctx.font = "bold 9px monospace";
                ctx.textAlign = "center";
                ctx.fillText("QUICKSAND", obs.x + obs.w / 2, obs.y + 12);

                // Warning arrow pointing up (jump hint)
                const warnPulse = 0.5 + 0.5 * Math.abs(Math.sin(performance.now() * 0.005));
                ctx.globalAlpha = warnPulse;
                ctx.fillStyle = "#fbbf24";
                ctx.font = "bold 12px sans-serif";
                ctx.fillText("↑ JUMP", obs.x + obs.w / 2, obs.y - 6);
                ctx.globalAlpha = 1;
                ctx.restore();

                // Collision: duck feet touching quicksand (duck not airborne)
                const sandHorizHit = obs.x < duckScreenX + duckWidth / 2 && obs.x + obs.w > duckScreenX - duckWidth / 2;
                const duckOnGround = skateDuck.y >= -2; // not jumping
                if (sandHorizHit && duckOnGround) {
                    // Slow the duck down — quicksand drags speed toward 1.5
                    skateSpeed += (1.5 - skateSpeed) * 0.06;

                    // Delete the linked item if there is one
                    if (obs.linkedItemId && !obs.itemDeleted) {
                        const idx = skateItems.findIndex(it => it.id === obs.linkedItemId);
                        if (idx !== -1) {
                            skateItems.splice(idx, 1);
                        }
                        obs.itemDeleted = true;
                    }
                }
            }

            if (obs.x < -120) skateObstacles.splice(i, 1);
        }

        // Render collectables
        for (let i = skateItems.length - 1; i >= 0; i--) {
            const item = skateItems[i];
            item.x -= skateSpeed;
            item.pulse += 0.06;

            ctx.save();
            ctx.translate(item.x, item.y);
            const bounce = Math.sin(item.pulse) * 5;
            const glow = 0.6 + 0.4 * Math.abs(Math.sin(item.pulse));
            ctx.translate(0, bounce);

            if (item.type === 'coin') {
                // Gold coin with star
                const cg = ctx.createRadialGradient(-4, -4, 1, 0, 0, item.radius);
                cg.addColorStop(0, "#fff176");
                cg.addColorStop(0.5, "#fbbf24");
                cg.addColorStop(1, "#b45309");
                ctx.shadowColor = `rgba(251,191,36,${glow})`;
                ctx.shadowBlur = 14;
                ctx.beginPath();
                ctx.arc(0, 0, item.radius, 0, Math.PI * 2);
                ctx.fillStyle = cg;
                ctx.fill();
                ctx.strokeStyle = "#f59e0b";
                ctx.lineWidth = 2;
                ctx.stroke();
                // Star inside
                ctx.fillStyle = "#fff";
                ctx.font = `bold ${item.radius}px sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 0;
                ctx.fillText("★", 0, 1);
            }
            else if (item.type === 'shield') {
                // Shield shape
                ctx.shadowColor = `rgba(6,182,212,${glow})`;
                ctx.shadowBlur = 16;
                const sg = ctx.createRadialGradient(-3, -5, 1, 0, 0, item.radius + 4);
                sg.addColorStop(0, "#a5f3fc");
                sg.addColorStop(0.6, "#06b6d4");
                sg.addColorStop(1, "#0e7490");
                ctx.fillStyle = sg;
                ctx.strokeStyle = "#67e8f9";
                ctx.lineWidth = 2;
                const r = item.radius + 2;
                ctx.beginPath();
                ctx.moveTo(0, -r);
                ctx.bezierCurveTo( r, -r * 0.7,  r,  r * 0.1,  0,  r);
                ctx.bezierCurveTo(-r,  r * 0.1, -r, -r * 0.7,  0, -r);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                // Shield cross / check mark
                ctx.shadowBlur = 0;
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2.5;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(-4, 0); ctx.lineTo(-1, 4); ctx.lineTo(5, -4);
                ctx.stroke();
            }
            else if (item.type === 'boost') {
                // Lightning bolt in a circle
                const bg = ctx.createRadialGradient(-3, -4, 1, 0, 0, item.radius + 3);
                bg.addColorStop(0, "#fdf4ff");
                bg.addColorStop(0.5, "#ec4899");
                bg.addColorStop(1, "#9d174d");
                ctx.shadowColor = `rgba(236,72,153,${glow})`;
                ctx.shadowBlur = 16;
                ctx.beginPath();
                ctx.arc(0, 0, item.radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = bg;
                ctx.fill();
                ctx.strokeStyle = "#f9a8d4";
                ctx.lineWidth = 2;
                ctx.stroke();
                // Lightning bolt
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.moveTo(3, -9);
                ctx.lineTo(-3, 0);
                ctx.lineTo(1, 0);
                ctx.lineTo(-3, 9);
                ctx.lineTo(4, -1);
                ctx.lineTo(0, -1);
                ctx.closePath();
                ctx.fill();
            }

            // High item hint — faint pulsing "▲ W" below item so player knows to stretch
            if (item.high) {
                const arrowAlpha = 0.35 + 0.35 * Math.abs(Math.sin(item.pulse * 1.5));
                ctx.shadowBlur = 0;
                ctx.globalAlpha = arrowAlpha;
                ctx.fillStyle = "#fde047";
                ctx.font = "bold 13px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("▲ W", 0, item.radius + 14);
                ctx.globalAlpha = 1;
            }

            ctx.shadowBlur = 0;
            ctx.restore();

            // Pickup collision — use a vertical range so the full duck height is checked
            const duckScreenX = 120;
            const duckTop    = groundY + skateDuck.y - skateDuck.height;  // topmost point of duck
            const duckBottom = groundY + skateDuck.y;                     // board level
            const duckMidY   = (duckTop + duckBottom) / 2;

            // Horizontal proximity
            const horizOk = Math.abs(item.x - duckScreenX) < item.radius + 30;
            // Vertical: item must overlap the duck's height range
            const itemScreenY = item.y + bounce;
            const vertOk = itemScreenY > duckTop - item.radius && itemScreenY < duckBottom + item.radius;

            if (horizOk && vertOk) {
                if (item.type === 'coin') {
                    skateLives = Math.min(skateLives + 1, 3);
                } else if (item.type === 'shield') {
                    skateDuck.shieldActive = true;
                } else if (item.type === 'boost') {
                    skateDuck.boostTimer = 4000;
                }
                skateItems.splice(i, 1);
                continue;
            }

            if (item.x < -100) skateItems.splice(i, 1);
        }

        // Draw Board
        const duckScreenX = 120;
        const duckScreenY = groundY + skateDuck.y;

        ctx.fillStyle = "#f43f5e";
        ctx.beginPath();
        ctx.roundRect(duckScreenX - 35, duckScreenY - 4, 70, 8, 4);
        ctx.fill();
        ctx.fillStyle = "#111";
        drawCircle(ctx, duckScreenX - 20, duckScreenY + 6, 6);
        drawCircle(ctx, duckScreenX + 20, duckScreenY + 6, 6);

        // === SKATE DUCK (full face) ===
        ctx.save();
        ctx.translate(duckScreenX, duckScreenY - 10);
        ctx.scale(0.5, 0.5 * skateDuck.scaleY);

        const duckYellow = "#FFD700";
        const duckOrange = "#FF8C00";

        // Legs
        ctx.strokeStyle = duckOrange;
        ctx.lineWidth = 12;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-15, 0); ctx.lineTo(-15, -40);
        ctx.moveTo(15, 0);  ctx.lineTo(15, -40);
        ctx.stroke();

        // Feet
        // Skate feet — single filled path each, same style as main duck
        function drawSkateFoot(isRight) {
            const s = isRight ? 1 : -1;
            const aw = 8, tl = 24, th = 9;
            ctx.fillStyle = duckYellow === "#FFD700" ? "#FF8C00" : duckOrange;
            ctx.strokeStyle = '#c2410c'; ctx.lineWidth = 1.5; ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(-aw, -16); ctx.lineTo(-aw, 0);
            ctx.bezierCurveTo(-aw, 4, -aw + s*4, th, -aw + s*tl*0.5, th);
            ctx.bezierCurveTo(-aw + s*tl, th, -aw + s*(tl+6), 4, -aw + s*(tl+6), 0);
            ctx.bezierCurveTo(-aw + s*(tl+6), -5, -aw + s*tl, -3, -aw + s*tl*0.5, -3);
            ctx.bezierCurveTo(-aw + s*4, -3, aw, -1, aw, 0);
            ctx.lineTo(aw, -16); ctx.closePath();
            ctx.fill(); ctx.stroke();
        }
        ctx.save(); ctx.translate(-20, -40); drawSkateFoot(false); ctx.restore();
        ctx.save(); ctx.translate( 20, -40); drawSkateFoot(true);  ctx.restore();

        // Tail
        ctx.save();
        ctx.translate(-50, -55);
        ctx.rotate(-0.5);
        drawEllipse(ctx, 0, 0, 18, 9, 0, 0, Math.PI * 2, duckYellow);
        ctx.restore();

        // Torso
        drawEllipse(ctx, -5, -60, 50, 55, 0, 0, Math.PI * 2, duckYellow);

        // Wings
        ctx.save();
        ctx.translate(-42, -65);
        ctx.rotate(0.3 + Math.sin(performance.now() * 0.008) * 0.25);
        drawEllipse(ctx, -15, 0, 36, 13, 0, 0, Math.PI * 2, duckYellow);
        ctx.restore();

        ctx.save();
        ctx.translate(32, -60);
        ctx.rotate(-0.4 - Math.sin(performance.now() * 0.008) * 0.25);
        drawEllipse(ctx, 15, 0, 36, 13, 0, 0, Math.PI * 2, duckYellow);
        ctx.restore();

        // Head
        ctx.save();
        ctx.translate(0, -140);
        drawCircle(ctx, 0, 0, 45, duckYellow);

        // Feather hair (3 feathers, wide-awake/excited)
        const skateFeatherDefs = [
            { bx: -13, by: -43, len: 20, curve: -7,  angle: -0.55 },
            { bx:   0, by: -47, len: 26, curve:  0,  angle:  0.0  },
            { bx:  13, by: -43, len: 20, curve:  7,  angle:  0.55 },
        ];
        for (const f of skateFeatherDefs) {
            ctx.save();
            ctx.translate(f.bx, f.by);
            ctx.rotate(f.angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(f.curve * 0.5, -f.len * 0.5, f.curve, -f.len);
            ctx.strokeStyle = duckOrange;
            ctx.lineWidth = 2.5;
            ctx.lineCap = "round";
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(f.curve - 6, -f.len * 0.6, f.curve, -f.len);
            ctx.quadraticCurveTo(f.curve + 6, -f.len * 0.6, 0, 0);
            ctx.closePath();
            ctx.fillStyle = duckYellow;
            ctx.strokeStyle = duckOrange;
            ctx.lineWidth = 1.8;
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        // Eyes — fully open (skating = wide awake, intensity=1)
        const skEyeSize = 14;
        const skEyeY = -18;
        drawCircle(ctx, -12, skEyeY, skEyeSize, "white");
        drawCircle(ctx,  18, skEyeY, skEyeSize, "white");
        // Pupils — jittery/excited
        const skJitter = (Math.random() - 0.5) * 3;
        drawCircle(ctx, -12 + skJitter + 2, skEyeY, skEyeSize * 0.45, "#3b82f6");
        drawCircle(ctx,  18 + skJitter + 2, skEyeY, skEyeSize * 0.45, "#3b82f6");
        drawCircle(ctx, -12 + skJitter + 1, skEyeY - 2, skEyeSize * 0.15, "white");
        drawCircle(ctx,  18 + skJitter + 1, skEyeY - 3, skEyeSize * 0.15, "white");

        // Beak — open with excitement
        ctx.fillStyle = duckOrange;
        ctx.strokeStyle = "#c2410c";
        ctx.lineWidth = 2;
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(33, -4); ctx.bezierCurveTo(58, -7, 76, 3, 72, 13); ctx.bezierCurveTo(57, 13, 43, 10, 28, 8);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(30, 8); ctx.bezierCurveTo(52, 14, 68, 12, 70, 18); ctx.bezierCurveTo(52, 22, 38, 20, 24, 17);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        ctx.restore(); // end head translate

        ctx.restore(); // end duck scale/translate

        // Hit flash — red overlay on duck
        if (hitFlashTimer > 0) {
            const flashAlpha = 0.5 * (hitFlashTimer / HIT_FLASH_DURATION) * (Math.sin(performance.now() * 0.03) > 0 ? 1 : 0.3);
            ctx.save();
            ctx.globalAlpha = flashAlpha;
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            ctx.ellipse(duckScreenX, duckScreenY - skateDuck.height / 2, 28, skateDuck.height / 2 + 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        // Shield aura
        if (skateDuck.shieldActive) {
            ctx.strokeStyle = "rgba(34, 211, 238, 0.85)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(duckScreenX, duckScreenY - skateDuck.height / 2 - 10, skateDuck.height / 2 + 25, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Boost aura
        if (skateDuck.boostTimer > 0) {
            ctx.strokeStyle = "rgba(236, 72, 153, 0.9)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(duckScreenX, duckScreenY - skateDuck.height / 2 - 10, skateDuck.height / 2 + 30, 0, Math.PI * 2);
            ctx.stroke();
        }

        // === HUD ===
        const hudX = 16, hudY = 72;
        const hudW = 300;

        // Count active powerup rows
        const activePowerups = (skateDuck.boostTimer > 0 ? 1 : 0) + (skateDuck.shieldActive ? 1 : 0);
        const hudH = 116 + activePowerups * 26;

        ctx.fillStyle = "rgba(10, 15, 35, 0.88)";
        ctx.beginPath();
        ctx.roundRect(hudX, hudY, hudW, hudH, 14);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const barW = hudW - 90;
        ctx.textAlign = "left";

        // Row 1: Score (obstacles cleared) + Lives
        ctx.fillStyle = "#a3e635";
        ctx.font = "bold 18px monospace";
        ctx.fillText(`🏁 ${skateScore} pts`, hudX + 14, hudY + 28);

        // Lives as hearts on the right (max 3)
        const livesX = hudX + hudW - 14;
        for (let h = 0; h < 3; h++) {
            ctx.font = "16px monospace";
            ctx.textAlign = "right";
            ctx.fillStyle = h < skateLives ? "#ef4444" : "rgba(255,255,255,0.2)";
            ctx.fillText("♥", livesX - h * 20, hudY + 28);
        }
        ctx.textAlign = "left";

        // Row 2: Speed bar
        ctx.fillStyle = "#94a3b8";
        ctx.font = "bold 12px monospace";
        ctx.fillText("SPEED", hudX + 14, hudY + 52);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.roundRect(hudX + 68, hudY + 40, barW, 13, 6); ctx.fill();
        const speedFrac = Math.min(Math.max((skateSpeed - 1) / 9, 0), 1);
        const speedColor = skateSpeed < 1.5 ? "#ef4444" : skateSpeed >= 9 ? "#ec4899" : skateSpeed >= 6 ? "#f97316" : "#22d3ee";
        ctx.fillStyle = speedColor;
        ctx.beginPath(); ctx.roundRect(hudX + 68, hudY + 40, barW * speedFrac, 13, 6); ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "bold 10px monospace";
        ctx.textAlign = "center";
        ctx.fillText(`${Math.floor(skateSpeed * 10)} km/h`, hudX + 68 + barW / 2, hudY + 51);
        ctx.textAlign = "left";

        // Row 3: D-key boost charge / recharge bar
        ctx.fillStyle = boostRecharging ? "#f97316" : "#facc15";
        ctx.font = "bold 12px monospace";
        ctx.fillText(boostRecharging ? "BOOST ⟳" : "BOOST D", hudX + 14, hudY + 78);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.roundRect(hudX + 68, hudY + 66, barW, 13, 6); ctx.fill();

        if (boostRecharging) {
            // Recharge fill — orange, counts up
            const rechargeFrac = boostRechargeTimer / BOOST_RECHARGE;
            ctx.fillStyle = "#f97316";
            ctx.beginPath(); ctx.roundRect(hudX + 68, hudY + 66, barW * rechargeFrac, 13, 6); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 10px monospace";
            ctx.textAlign = "center";
            ctx.fillText(`${((BOOST_RECHARGE - boostRechargeTimer) / 1000).toFixed(1)}s`, hudX + 68 + barW / 2, hudY + 77);
        } else {
            // Charge available — yellow drains as D is held
            const chargeFrac = boostCharge / BOOST_USE_MAX;
            ctx.fillStyle = chargeFrac > 0.4 ? "#facc15" : "#f97316";
            ctx.beginPath(); ctx.roundRect(hudX + 68, hudY + 66, barW * chargeFrac, 13, 6); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 10px monospace";
            ctx.textAlign = "center";
            ctx.fillText(skateKeys['d'] && boostCharge > 0 ? "BOOSTING!" : "HOLD D", hudX + 68 + barW / 2, hudY + 77);
        }
        ctx.textAlign = "left";

        // Row 4+: Active powerup timers
        let powerY = hudY + 104;
        const BOOST_MAX = 4000;

        if (skateDuck.boostTimer > 0) {
            ctx.fillStyle = "#ec4899";
            ctx.font = "bold 12px monospace";
            ctx.fillText("⚡ ITEM BOOST", hudX + 14, powerY);
            const bFrac = Math.max(0, skateDuck.boostTimer / BOOST_MAX);
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.beginPath(); ctx.roundRect(hudX + 112, powerY - 11, barW - 32, 13, 6); ctx.fill();
            ctx.fillStyle = "#ec4899";
            ctx.beginPath(); ctx.roundRect(hudX + 112, powerY - 11, (barW - 32) * bFrac, 13, 6); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 10px monospace";
            ctx.textAlign = "center";
            ctx.fillText(`${(skateDuck.boostTimer / 1000).toFixed(1)}s`, hudX + 112 + (barW - 32) / 2, powerY);
            ctx.textAlign = "left";
            powerY += 26;
        }

        if (skateDuck.shieldActive) {
            const pulse = 0.55 + 0.45 * Math.abs(Math.sin(performance.now() * 0.005));
            ctx.fillStyle = "#06b6d4";
            ctx.font = "bold 12px monospace";
            ctx.fillText("🛡 SHIELD", hudX + 14, powerY);
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.beginPath(); ctx.roundRect(hudX + 88, powerY - 11, barW - 8, 13, 6); ctx.fill();
            ctx.fillStyle = `rgba(6,182,212,${pulse})`;
            ctx.beginPath(); ctx.roundRect(hudX + 88, powerY - 11, barW - 8, 13, 6); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.font = "bold 10px monospace";
            ctx.textAlign = "center";
            ctx.fillText("ACTIVE", hudX + 88 + (barW - 8) / 2, powerY);
            ctx.textAlign = "left";
        }

        // Slow-speed warning
        if (skateSpeed < 2) {
            const warnAlpha = 0.4 + 0.6 * Math.abs(Math.sin(performance.now() * 0.006));
            ctx.fillStyle = `rgba(239,68,68,${warnAlpha})`;
            ctx.font = "bold 18px monospace";
            ctx.textAlign = "center";
            ctx.fillText("⚠ TOO SLOW!", width / 2, hudY + 30);
            ctx.textAlign = "left";
        }
    }

    // --- Main Loop ---
    function animate() {
        const now = performance.now();
        const dt = Math.min(now - lastFrameTime, 50); 
        lastFrameTime = now;

        if (isSkateMode) {
            runSkateGame(dt);
            requestAnimationFrame(animate);
            return;
        }

        const cx = width / 2;
        const cy = height / 2 + 50;
        // Weapon targeting uses duck[0] as primary target
        const physics = ducks[0].physics;
        const duckScreenX = cx + physics.x;
        const duckScreenY = cy + physics.y - 30;

        // Keep ducks[0] globals in sync for backward-compat weapon code
        const duckMutations = ducks[0].mutations;
        const globalSquashX = ducks[0].squash.x;
        const globalSquashY = ducks[0].squash.y;

        // Show/hide clear reset button
        const hasMutations = ducks.some(d =>
            Math.abs(d.mutations.currentFat - 1.0) > 0.05 ||
            Math.abs(d.mutations.currentMuscle - 1.0) > 0.05 ||
            d.mutations.currentEnergy > 0.05 ||
            d.mutations.currentGum > 0.05
        );
        const hasFriends = ducks.length > 1;
        const hasWeapon = currentTool === 'freeze' || taserArmed || flameArmed || fanActive || frozenTimeRemaining > 0;
        if (balls.length > 0 || foods.length > 0 || hasMutations || hasWeapon || hasFriends) {
            clearBtn.style.display = 'block';
        } else {
            clearBtn.style.display = 'none';
        }

        // Per-duck: interpolate mutations, squash, and limbs for ALL ducks
        for (const d of ducks) {
            const m = d.mutations;
            m.currentFat    += (m.fat    - m.currentFat)    * 0.08;
            m.currentMuscle += (m.muscle - m.currentMuscle) * 0.08;
            m.currentEnergy += (m.energy - m.currentEnergy) * 0.08;
            m.currentGum    += (m.gum    - m.currentGum)    * 0.08;

            if (m.currentGum > 0.1) {
                const displacement = d.squash.y - 1.0;
                d.squash.v += -0.15 * displacement;
                d.squash.v *= 0.82;
                d.squash.y += d.squash.v;
                d.squash.x = 1 / d.squash.y;
            } else {
                d.squash.x += (1.0 - d.squash.x) * 0.1;
                d.squash.y += (1.0 - d.squash.y) * 0.1;
            }

            for (const k in d.limbs) {
                if (dragTargetLimb && dragTargetLimb.duck === d && dragTargetLimb.limb === k) continue;
                const l = d.limbs[k];
                l.vx += -l.ox * 0.14; l.vy += -l.oy * 0.14;
                l.vx *= 0.78; l.vy *= 0.78;
                l.ox += l.vx; l.oy += l.vy;
                if (Math.hypot(l.ox, l.oy) < 0.1 && Math.hypot(l.vx, l.vy) < 0.1) {
                    l.ox = 0; l.oy = 0; l.vx = 0; l.vy = 0;
                }
            }
        }

        // Freeze calculations
        if (isShooting) {
            freezeCharge += dt;
            for(let i=0; i<3; i++) {
                rayParticles.push({
                    x: lastPointer.x + (Math.random()-0.5)*20,
                    y: lastPointer.y + (Math.random()-0.5)*20,
                    vx: (duckScreenX - lastPointer.x) * 0.05 + (Math.random()-0.5)*25,
                    vy: (duckScreenY - lastPointer.y) * 0.05 + (Math.random()-0.5)*25,
                    life: 1.0
                });
            }
        } else {
            if (frozenTimeRemaining > 0) {
                frozenTimeRemaining -= dt;
                if (frozenTimeRemaining <= 0) { frozenTimeRemaining = 0; freezeCharge = 0; }
            } else {
                freezeCharge = 0;
            }
        }
        const isFrozen = (isShooting && freezeCharge > 0) || frozenTimeRemaining > 0;

        // Taser logic — only zaps when tip is on the duck
        let taserShakeX = 0, taserShakeY = 0;
        if (taserArmed && lastPointer) {
            // Check if taser tip (cursor) is touching the duck body
            const taserDist = Math.hypot(lastPointer.x - duckScreenX, lastPointer.y - duckScreenY);
            taserOnDuck = taserShooting && taserDist < 90;

            if (taserOnDuck) {
                taserActive = true;
                // Violent shake proportional to contact
                taserShakeX = (Math.random()-0.5) * 26;
                taserShakeY = (Math.random()-0.5) * 26;
                for (let i = 0; i < 2; i++) {
                    taserParticles.push({
                        x: duckScreenX + (Math.random()-0.5)*70,
                        y: duckScreenY - 60 - Math.random()*100,
                        vx: (Math.random()-0.5)*6, vy: -2 - Math.random()*4,
                        life: 1.0, size: 3 + Math.random()*5
                    });
                }
            } else {
                taserActive = false;
            }

            // Draw taser device at cursor
            ctx.save();
            ctx.translate(lastPointer.x, lastPointer.y);
            // Body — dark rectangle
            ctx.fillStyle = "#1e293b";
            ctx.strokeStyle = "#64748b";
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(-9, 0, 18, 38, 4); ctx.fill(); ctx.stroke();
            // Yellow warning stripe on body
            ctx.fillStyle = "#facc15";
            ctx.beginPath(); ctx.rect(-9, 10, 18, 5); ctx.fill();
            // Two prong tips at top
            ctx.fillStyle = "#94a3b8";
            ctx.strokeStyle = "#e2e8f0";
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(-7, -12, 5, 14, 2); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.roundRect(2, -12, 5, 14, 2); ctx.fill(); ctx.stroke();
            // Electric arc between prongs when on duck
            if (taserOnDuck) {
                ctx.strokeStyle = `rgba(250,204,21,${0.7 + Math.random()*0.3})`;
                ctx.lineWidth = 2;
                ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(-4, -12);
                // 4-point squiggly arc
                const mid1X = -4 + (Math.random()-0.5)*10;
                const mid1Y = -12 + (Math.random()-0.5)*8 - 6;
                const mid2X = 4 + (Math.random()-0.5)*10;
                const mid2Y = -12 + (Math.random()-0.5)*8 - 6;
                ctx.lineTo(mid1X, mid1Y);
                ctx.lineTo(mid2X, mid2Y);
                ctx.lineTo(4, -12);
                ctx.stroke();
                // Inner white hot core
                ctx.strokeStyle = `rgba(255,255,255,${0.5 + Math.random()*0.5})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-4, -12);
                ctx.lineTo(mid1X * 0.6, mid1Y);
                ctx.lineTo(mid2X * 0.6, mid2Y);
                ctx.lineTo(4, -12);
                ctx.stroke();
            }
            ctx.restore();
        } else {
            taserActive = false;
        }

        // Flamethrower logic — active while holding, shoots flame from cursor toward duck
        let flameDuckOffsetX = 0;
        if (flameArmed && lastPointer) {
            flameActive = flameShooting;
            if (flameShooting) {
                flameTimer = FLAME_DURATION;
                // Duck runs left-right frantically
                flameDuckX += Math.sin(now * 0.012) * 5;
                flameDuckX = Math.max(-width * 0.3, Math.min(width * 0.3, flameDuckX));
                flameDuckOffsetX = flameDuckX;
                // Spawn flame particles from cursor streaming toward duck
                for (let i = 0; i < 5; i++) {
                    const t2 = Math.random();
                    flameParticles.push({
                        x: lastPointer.x + (duckScreenX - lastPointer.x) * t2 * 0.5 + (Math.random()-0.5)*20,
                        y: lastPointer.y + (duckScreenY - lastPointer.y) * t2 * 0.5 + (Math.random()-0.5)*20,
                        vx: (duckScreenX - lastPointer.x) * 0.02 + (Math.random()-0.5)*3,
                        vy: (duckScreenY - lastPointer.y) * 0.02 - 2 - Math.random()*3,
                        life: 1.0,
                        hue: 10 + Math.random() * 40,
                        size: 10 + Math.random() * 18
                    });
                }
            } else {
                flameDuckX += (0 - flameDuckX) * 0.05;
                flameDuckOffsetX = flameDuckX;
            }
            // Draw crosshair at cursor for flamethrower
            ctx.save();
            ctx.translate(lastPointer.x, lastPointer.y);
            const chColor = flameShooting ? "#ef4444" : "#f97316";
            ctx.strokeStyle = chColor;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.85;
            ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(-6, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(6, 0);  ctx.lineTo(16, 0);  ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(0, -6); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 6);  ctx.lineTo(0, 16);  ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI*2); ctx.stroke();
            if (flameShooting) {
                // Pulsing fire ring when active
                ctx.beginPath(); ctx.arc(0, 0, 10 + Math.sin(now*0.02)*3, 0, Math.PI*2);
                ctx.strokeStyle = "#facc15"; ctx.globalAlpha = 0.5; ctx.lineWidth = 1.5; ctx.stroke();
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        } else if (!flameArmed) {
            flameActive = false; flameDuckX = 0;
            flameDuckOffsetX = 0;
        }

        // Giant Fan logic — angle-based wind force on duck
        let fanOffsetY = 0, fanOffsetX = 0;
        if (fanActive && fanAnchored) {
            const duckScreenX2 = width / 2 + physics.x;
            const duckScreenY2 = height / 2 + 50 + physics.y;
            const windDx = Math.cos(fanAngle);
            const windDy = Math.sin(fanAngle);
            const toDuckDx = duckScreenX2 - fanX;
            const toDuckDy = duckScreenY2 - fanY;
            const dist = Math.hypot(toDuckDx, toDuckDy) || 1;
            const dot = (toDuckDx / dist) * windDx + (toDuckDy / dist) * windDy;
            const inStream = Math.max(0, dot);
            const gravity = parseFloat(gravitySlider.value) / 100;
            const windStr = 110 * inStream;
            fanHoverX += (windDx * windStr - fanHoverX) * 0.04;
            fanHoverY += (windDy * windStr * (1 - gravity * 0.55) - fanHoverY) * 0.04;
            fanOffsetX = fanHoverX;
            fanOffsetY = fanHoverY;
            for (let i = 0; i < 3; i++) {
                const spread = (Math.random() - 0.5) * 30;
                const perpX = -windDy * spread, perpY = windDx * spread;
                const spd = 4 + Math.random() * 5;
                fanWindParticles.push({
                    x: fanX + perpX, y: fanY + perpY,
                    vx: windDx * spd, vy: windDy * spd,
                    life: 1.0, size: 4 + Math.random() * 9
                });
            }
        } else {
            fanHoverX += (0 - fanHoverX) * 0.06;
            fanHoverY += (0 - fanHoverY) * 0.06;
            fanOffsetX = fanHoverX;
            fanOffsetY = fanHoverY;
        }

        if (!isFrozen) {
            const speedUpMultiplier = 1.0 + (duckMutations.currentEnergy * 1.5);
            duckTime += dt * speedUpMultiplier;
        }

        // Update taser particles
        for (let i = taserParticles.length - 1; i >= 0; i--) {
            const p = taserParticles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.05;
            if (p.life <= 0) { taserParticles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = `hsl(${50 + Math.random()*20},100%,70%)`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        // Update flame particles
        for (let i = flameParticles.length - 1; i >= 0; i--) {
            const p = flameParticles[i];
            p.x += p.vx; p.y += p.vy; p.life -= 0.025;
            if (p.life <= 0) { flameParticles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life * 0.7;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
            ctx.fillStyle = `hsla(${p.hue},100%,55%,1)`;
            ctx.fill();
            ctx.restore();
        }

        drawBackground(now); 
        updateAndDrawBallsAndFoods(dt);

        // Draw wind particles (after background so they're visible)
        for (let i = fanWindParticles.length - 1; i >= 0; i--) {
            const wp = fanWindParticles[i];
            wp.x += wp.vx; wp.y += wp.vy; wp.life -= 0.022;
            if (wp.life <= 0) { fanWindParticles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = wp.life * 0.7;
            ctx.beginPath();
            ctx.arc(wp.x, wp.y, wp.size * (0.4 + wp.life * 0.6), 0, Math.PI * 2);
            ctx.fillStyle = "#bae6fd";
            ctx.fill();
            ctx.restore();
        }

        // Draw Giant Fan widget (after background so it's always visible)
        if (fanActive) {
            const drawX = fanPlacing ? (lastPointer ? lastPointer.x : width / 2) : fanX;
            const drawY = fanPlacing ? (lastPointer ? lastPointer.y : height / 2) : fanY;

            // Draw air stream beam first (behind the fan body)
            if (fanAnchored) {
                const windDx = Math.cos(fanAngle);
                const windDy = Math.sin(fanAngle);
                const beamLen = 320;
                const beamPerpX = -windDy;
                const beamPerpY =  windDx;

                // Solid cone beam
                ctx.save();
                const coneGrad = ctx.createLinearGradient(
                    drawX, drawY,
                    drawX + windDx * beamLen, drawY + windDy * beamLen
                );
                coneGrad.addColorStop(0,   "rgba(147,210,255,0.55)");
                coneGrad.addColorStop(0.4, "rgba(147,210,255,0.25)");
                coneGrad.addColorStop(1,   "rgba(147,210,255,0)");
                ctx.fillStyle = coneGrad;
                ctx.beginPath();
                ctx.moveTo(drawX + beamPerpX * 14, drawY + beamPerpY * 14);
                ctx.lineTo(drawX + windDx * beamLen + beamPerpX * 55, drawY + windDy * beamLen + beamPerpY * 55);
                ctx.lineTo(drawX + windDx * beamLen - beamPerpX * 55, drawY + windDy * beamLen - beamPerpY * 55);
                ctx.lineTo(drawX - beamPerpX * 14, drawY - beamPerpY * 14);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // Animated stream lines inside the cone
                ctx.save();
                ctx.strokeStyle = "rgba(186,230,253,0.65)";
                ctx.lineWidth = 2;
                ctx.lineCap = "round";
                for (let s = 0; s < 6; s++) {
                    const offset = (s - 2.5) * 11;
                    const animT = ((now * 0.003) + s * 0.22) % 1;
                    const startDist = animT * beamLen * 0.2;
                    const endDist   = animT * beamLen;
                    const widen = endDist / beamLen;
                    const sx = drawX + windDx * startDist + beamPerpX * offset * (0.1 + startDist / beamLen);
                    const sy = drawY + windDy * startDist + beamPerpY * offset * (0.1 + startDist / beamLen);
                    const ex = drawX + windDx * endDist   + beamPerpX * offset * widen;
                    const ey = drawY + windDy * endDist   + beamPerpY * offset * widen;
                    ctx.globalAlpha = (1 - animT) * 0.8;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(ex, ey);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
                ctx.restore();
            }

            // Fan body
            ctx.save();
            ctx.translate(drawX, drawY);
            ctx.rotate(fanAngle + Math.PI);

            // Barrel / nozzle
            ctx.fillStyle = "#1e293b";
            ctx.strokeStyle = "#64748b";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(-7, -54, 14, 56, 5); ctx.fill(); ctx.stroke();
            // Nozzle flare
            ctx.fillStyle = "#374151";
            ctx.beginPath(); ctx.roundRect(-11, -60, 22, 10, 3); ctx.fill();

            // Hub body
            const hubG = ctx.createRadialGradient(-5, -5, 3, 0, 0, 30);
            hubG.addColorStop(0, "#94a3b8"); hubG.addColorStop(1, "#1e3a5f");
            ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI * 2);
            ctx.fillStyle = hubG; ctx.fill();
            ctx.strokeStyle = "#334155"; ctx.lineWidth = 3; ctx.stroke();

            // Spinning blades
            ctx.save();
            ctx.rotate(now * 0.02 * (fanAnchored ? 1 : 0.1));
            for (let b = 0; b < 4; b++) {
                ctx.rotate(Math.PI / 2);
                ctx.fillStyle = "rgba(203,213,225,0.9)";
                ctx.beginPath(); ctx.ellipse(20, 0, 22, 8, 0.2, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            // Center cap
            ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2);
            ctx.fillStyle = "#f8fafc"; ctx.fill();

            // Dashed drag-handle ring
            if (fanAnchored) {
                ctx.beginPath(); ctx.arc(0, 0, 36, 0, Math.PI * 2);
                ctx.strokeStyle = fanDraggingAngle ? "rgba(250,204,21,0.9)" : "rgba(250,204,21,0.5)";
                ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
            }
            ctx.restore();

            // Labels (drawn un-rotated, in screen space)
            ctx.save();
            ctx.textAlign = "center";
            if (fanPlacing) {
                ctx.fillStyle = "rgba(250,204,21,0.95)";
                ctx.font = "bold 13px monospace";
                ctx.fillText("Click to place", drawX, drawY - 65);
            } else if (fanAnchored && !fanDraggingAngle) {
                ctx.fillStyle = "rgba(186,230,253,0.85)";
                ctx.font = "bold 11px monospace";
                ctx.fillText("Drag to aim  •  Double-click to move", fanX, fanY + 58);
            }
            ctx.restore();
        }

        // Draw all ducks with their own physics/colors (proper multi-duck)
        // Duck-to-duck collision resolution
        for (let i = 0; i < ducks.length; i++) {
            for (let j = i + 1; j < ducks.length; j++) {
                const d1 = ducks[i], d2 = ducks[j];
                const dx = d2.physics.x - d1.physics.x;
                const dy = d2.physics.y - d1.physics.y;
                const dist = Math.hypot(dx, dy);
                const r1 = 45 * d1.mutations.currentFat, r2 = 45 * d2.mutations.currentFat;
                const minDist = r1 + r2;
                if (dist < minDist && dist > 0.01) {
                    const overlap = minDist - dist;
                    const nx = dx / dist, ny = dy / dist;
                    const m1 = d1.physics.isDragging ? 0 : 0.5;
                    const m2 = d2.physics.isDragging ? 0 : 0.5;
                    const total = m1 + m2 || 1;
                    if (!d1.physics.isDragging) { d1.physics.x -= nx * overlap * (m1 / total); d1.physics.y -= ny * overlap * (m1 / total); }
                    if (!d2.physics.isDragging) { d2.physics.x += nx * overlap * (m2 / total); d2.physics.y += ny * overlap * (m2 / total); }
                    const rvx = d2.physics.vx - d1.physics.vx;
                    const rvy = d2.physics.vy - d1.physics.vy;
                    const velN = rvx * nx + rvy * ny;
                    if (velN < 0) {
                        const restitution = 0.55;
                        const imp = -(1 + restitution) * velN / (total * 2);
                        if (!d1.physics.isDragging) { d1.physics.vx -= nx * imp; d1.physics.vy -= ny * imp; }
                        if (!d2.physics.isDragging) { d2.physics.vx += nx * imp; d2.physics.vy += ny * imp; }
                    }
                }
            }
        }

        // Draw each duck
        for (const d of ducks) {
            const shakeX = d.taserActive ? (Math.random()-0.5)*26 : 0;
            const shakeY = d.taserActive ? (Math.random()-0.5)*26 : 0;
            ctx.save();
            ctx.translate(shakeX + (d.flameDuckX||0) + (d.fanOffsetX||0), shakeY + (d.fanOffsetY||0));
            drawDuck(d, duckTime);
            ctx.restore();
        }
        
        drawFreezeRayEffects(dt, duckScreenX, duckScreenY);

        // Draw dance move HUD
        if (!isSkateMode) drawMoveHUD(performance.now());

        requestAnimationFrame(animate);
    }

    // Start Loop
    requestAnimationFrame(animate);

    // =============================================
    // MUSIC PLAYER
    // =============================================
    const musicPlayer  = document.getElementById('musicPlayer');
    const musicBody    = document.getElementById('musicBody');
    const collapseBtn  = document.getElementById('collapseBtn');
    const vizCanvas    = document.getElementById('vizCanvas');
    const vzCtx        = vizCanvas.getContext('2d');
    const trackNameEl  = document.getElementById('trackName');
    const progressBar  = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const playBtn      = document.getElementById('playBtn');
    const prevBtn      = document.getElementById('prevBtn');
    const nextBtn      = document.getElementById('nextBtn');
    const shuffleBtn   = document.getElementById('shuffleBtn');
    const repeatBtn    = document.getElementById('repeatBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const playlistEl   = document.getElementById('playlist');
    const musicUpload  = document.getElementById('musicUpload');
    const vizToggleBtn = document.getElementById('vizToggleBtn');

    let audioCtx, sourceNode, gainNode;
    let tracks = [];
    let currentTrack = -1;
    let isShuffle = false;
    let isRepeat  = false;
    let musicDrivesDuck = false;
    let audioEl = new Audio();
    audioEl.crossOrigin = 'anonymous';

    function initAudioCtx() {
        if (audioCtx) return;
        audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
        analyser  = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        gainNode  = audioCtx.createGain();
        sourceNode = audioCtx.createMediaElementSource(audioEl);
        sourceNode.connect(analyser);
        analyser.connect(gainNode);
        gainNode.connect(audioCtx.destination);
    }

    // Collapse / expand — click anywhere on header
    let collapsed = false;
    document.getElementById('musicHeader').addEventListener('click', (e) => {
        // Don't collapse when clicking the drive button
        if (e.target === vizToggleBtn || vizToggleBtn.contains(e.target)) return;
        collapsed = !collapsed;
        musicBody.classList.toggle('collapsed', collapsed);
        collapseBtn.textContent = collapsed ? '▼' : '▲';
    });

    // File upload
    musicUpload.addEventListener('change', e => {
        Array.from(e.target.files).forEach(f => {
            tracks.push({ name: f.name.replace(/\.[^/.]+$/, ''), url: URL.createObjectURL(f) });
        });
        renderPlaylist();
        if (currentTrack === -1) loadTrack(0);
        e.target.value = '';
    });

    function renderPlaylist() {
        playlistEl.innerHTML = '';
        tracks.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'pl-item' + (i === currentTrack ? ' active' : '');
            div.textContent = `${i + 1}. ${t.name}`;
            div.addEventListener('click', () => { loadTrack(i); playAudio(); });
            playlistEl.appendChild(div);
        });
    }

    function loadTrack(idx) {
        if (!tracks.length) return;
        currentTrack = ((idx % tracks.length) + tracks.length) % tracks.length;
        audioEl.src = tracks[currentTrack].url;
        audioEl.load();
        trackNameEl.textContent = tracks[currentTrack].name;
        progressFill.style.width = '0%';
        renderPlaylist();
    }

    function playAudio() {
        initAudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioEl.play();
        isPlaying = true;
        playBtn.textContent = '⏸';
    }

    function pauseAudio() {
        audioEl.pause();
        isPlaying = false;
        playBtn.textContent = '▶';
    }

    playBtn.addEventListener('click', () => {
        if (!tracks.length) return;
        if (currentTrack === -1) loadTrack(0);
        isPlaying ? pauseAudio() : playAudio();
    });

    prevBtn.addEventListener('click', () => {
        if (!tracks.length) return;
        loadTrack(isShuffle ? Math.floor(Math.random() * tracks.length) : currentTrack - 1);
        if (isPlaying) playAudio();
    });

    nextBtn.addEventListener('click', () => {
        if (!tracks.length) return;
        loadTrack(isShuffle ? Math.floor(Math.random() * tracks.length) : currentTrack + 1);
        if (isPlaying) playAudio();
    });

    audioEl.addEventListener('ended', () => {
        if (isRepeat) { audioEl.currentTime = 0; playAudio(); return; }
        const nextIdx = isShuffle ? Math.floor(Math.random() * tracks.length) : currentTrack + 1;
        if (nextIdx < tracks.length) { loadTrack(nextIdx); playAudio(); }
        else { isPlaying = false; playBtn.textContent = '▶'; }
    });

    shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active', isShuffle);
    });
    repeatBtn.addEventListener('click', () => {
        isRepeat = !isRepeat;
        repeatBtn.classList.toggle('active', isRepeat);
    });

    volumeSlider.addEventListener('input', () => {
        const v = volumeSlider.value / 100;
        if (gainNode) gainNode.gain.value = v;
        audioEl.volume = v;
    });

    // Progress bar click to seek
    progressBar.addEventListener('click', e => {
        if (!audioEl.duration) return;
        const r = progressBar.getBoundingClientRect();
        audioEl.currentTime = ((e.clientX - r.left) / r.width) * audioEl.duration;
    });

    // Duck drive toggle
    vizToggleBtn.addEventListener('click', e => {
        e.stopPropagation();
        musicDrivesDuck = !musicDrivesDuck;
        vizToggleBtn.style.background = musicDrivesDuck ? 'rgba(250,204,21,0.3)' : '';
        vizToggleBtn.style.color = musicDrivesDuck ? '#facc15' : '';
    });

    // Visualizer + intensity driver — runs every animation frame
    function drawVisualizer() {
        const W = vizCanvas.width = vizCanvas.offsetWidth * (window.devicePixelRatio || 1);
        const H = vizCanvas.height;
        vzCtx.clearRect(0, 0, W, H);

        if (!analyser || !isPlaying) {
            // idle placeholder bars
            vzCtx.fillStyle = 'rgba(129,140,248,0.15)';
            const bw = W / 32 - 2;
            for (let i = 0; i < 32; i++) {
                const h = 4 + Math.sin(Date.now() * 0.002 + i * 0.4) * 4;
                vzCtx.beginPath();
                vzCtx.roundRect(i * (bw + 2), H - h - 2, bw, h, 2);
                vzCtx.fill();
            }
            return;
        }

        analyser.getByteFrequencyData(freqData);
        const bars = 48;
        const bw = W / bars - 1.5;

        // Compute overall energy (0-1)
        let sum = 0;
        for (let i = 0; i < freqData.length; i++) sum += freqData[i];
        const rawEnergy = sum / (freqData.length * 255);
        smoothEnergy += (rawEnergy - smoothEnergy) * 0.12;

        // Drive duck intensity if toggled
        if (musicDrivesDuck) {
            intensity = Math.min(1, smoothEnergy * 3.2);
            slider.value = intensity * 100;
        }

        // Draw bars
        for (let i = 0; i < bars; i++) {
            const dataIdx = Math.floor(i / bars * freqData.length * 0.75);
            const v = freqData[dataIdx] / 255;
            const h = Math.max(3, v * H * 0.92);
            const hue = 240 + v * 100;  // indigo → pink
            vzCtx.fillStyle = `hsla(${hue},80%,65%,${0.5 + v * 0.5})`;
            vzCtx.beginPath();
            vzCtx.roundRect(i * (bw + 1.5), H - h, bw, h, 2);
            vzCtx.fill();
        }

        // Beat pulse — glow center peak
        const peak = Math.max(...freqData.slice(2, 16)) / 255;
        if (peak > 0.6) {
            vzCtx.save();
            vzCtx.globalAlpha = (peak - 0.6) * 1.5;
            const grad = vzCtx.createRadialGradient(W/2, H, 0, W/2, H, W * 0.5);
            grad.addColorStop(0, 'rgba(250,204,21,0.6)');
            grad.addColorStop(1, 'rgba(250,204,21,0)');
            vzCtx.fillStyle = grad;
            vzCtx.fillRect(0, 0, W, H);
            vzCtx.restore();
        }
    }

    // Update progress bar + visualizer on each rAF
    (function vizLoop() {
        requestAnimationFrame(vizLoop);
        if (audioEl.duration) {
            progressFill.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
        }
        drawVisualizer();
    })();
</script>
</body>
</html>
